# Validates both shared presets on every change and gates main on the result.
# Both default.json and standards.json are load-bearing for the whole
# managed-deps fleet: a JSON typo, an invalid Renovate option or a colliding
# packageRule silently breaks every drift PR across every consumer repo.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-presets:
    name: validate-presets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: JSON syntax check
        run: |
          for file in *.json; do
            echo "jq: $file"
            jq . "$file" > /dev/null
          done

      - name: Renovate config validation
        run: pnpm dlx --package renovate -- renovate-config-validator default.json standards.json
